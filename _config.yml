# Abby Heo — GitHub Pages portfolio
# Minimal Mistakes theme: https://github.com/mmistakes/minimal-mistakes

title: "Abby Heo"
name: "Dahm-won (Abby) Heo"
description: "AI data operations, workflow design, and deployment-oriented builder portfolio."
url: "https://abbyheo.github.io"
baseurl: ""
repository: "abbyheo/abbyheo.github.io"

remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: "default"

locale: "en-US"
timezone: "America/Los_Angeles"

plugins:
  - jekyll-include-cache
  - jekyll-remote-theme

markdown: kramdown
kramdown:
  input: GFM

permalink: /:categories/:title/

include:
  - _pages

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: true
      share: false

atom_feed:
  hide: true

search: false

# Author profile shown in the sidebar
author:
  name: "Abby Heo"
  avatar: "/assets/images/abby-heo-profile.jpg"
  bio: "I turn ambiguity into measurable, deployable systems by building workflows for messy data operations."
  location: "Seoul, South Korea"
  links: []

footer:
  links: []
